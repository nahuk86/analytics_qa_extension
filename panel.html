<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics QA Panel</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1e2e;
      --surface:   #2a2a3e;
      --surface2:  #313148;
      --border:    #3a3a5c;
      --text:      #cdd6f4;
      --muted:     #7f849c;
      --accent:    #89b4fa;
      --pass:      #a6e3a1;
      --fail:      #f38ba8;
      --warn:      #f9e2af;
      --pass-bg:   rgba(166,227,161,0.12);
      --fail-bg:   rgba(243,139,168,0.12);
      --warn-bg:   rgba(249,226,175,0.12);
      --font:      'Segoe UI', system-ui, sans-serif;
      --mono:      'Cascadia Code', 'Consolas', monospace;
      --radius:    6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-right: 8px;
      white-space: nowrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-group label {
      color: var(--muted);
      font-size: 11px;
    }

    select, input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 12px;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--border); }
    .btn.danger { border-color: var(--fail); color: var(--fail); }
    .btn.danger:hover { background: var(--fail-bg); }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: rgba(137,180,250,0.12); }

    #hit-count {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Hit list ────────────────────────────────────────────────── */
    #hit-list {
      width: 340px;
      min-width: 200px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .hit-item {
      display: grid;
      grid-template-columns: 6px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .hit-item:hover { background: var(--surface2); }
    .hit-item.selected { background: var(--surface2); }

    .hit-status-bar {
      width: 6px;
      height: 100%;
      min-height: 30px;
      border-radius: 3px;
    }
    .hit-status-bar.PASS { background: var(--pass); }
    .hit-status-bar.FAIL { background: var(--fail); }
    .hit-status-bar.WARNING { background: var(--warn); }

    .hit-info { overflow: hidden; }
    .hit-events {
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hit-time {
      font-size: 10px;
      color: var(--muted);
    }

    .hit-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
    }
    .hit-badge.PASS  { color: var(--pass);  background: var(--pass-bg);  }
    .hit-badge.FAIL  { color: var(--fail);  background: var(--fail-bg);  }
    .hit-badge.WARNING { color: var(--warn); background: var(--warn-bg); }

    /* ── Detail pane ─────────────────────────────────────────────── */
    #detail-pane {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    #detail-pane .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section h2 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-section h2 .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: none;
      letter-spacing: 0;
    }
    .badge.PASS    { color: var(--pass);  background: var(--pass-bg);  }
    .badge.FAIL    { color: var(--fail);  background: var(--fail-bg);  }
    .badge.WARNING { color: var(--warn);  background: var(--warn-bg);  }

    pre.payload {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    .validation-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .validation-table th, .validation-table td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    .validation-table th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .validation-table tr:last-child td { border-bottom: none; }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status-dot.PASS    { background: var(--pass); }
    .status-dot.FAIL    { background: var(--fail); }
    .status-dot.WARNING { background: var(--warn); }

    .error-msg  { color: var(--fail);  font-size: 11px; }
    .warn-msg   { color: var(--warn);  font-size: 11px; }

    /* SDK / AEP labels */
    .aep-badge { color: var(--accent); font-weight: 600; }
    .sdk-aep   { color: var(--accent); }

    /* Diff table */
    .diff-added   { color: var(--pass); }
    .diff-removed { color: var(--fail); }
    .diff-changed { color: var(--warn); }

    /* ── Empty / loading states ───────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
    }
    #empty-state svg { opacity: 0.3; }
    #empty-state p { font-size: 13px; }

    /* ── Scrollbars ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <h1>🔍 Analytics QA</h1>

    <div class="filter-group">
      <label for="filter-status">Status</label>
      <select id="filter-status">
        <option value="">All</option>
        <option value="PASS">PASS</option>
        <option value="FAIL">FAIL</option>
        <option value="WARNING">WARNING</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filter-type">Type</label>
      <select id="filter-type">
        <option value="">All</option>
        <option value="pageView">Page View</option>
        <option value="customLink">Custom Link</option>
        <option value="downloadLink">Download</option>
        <option value="exitLink">Exit Link</option>
        <option value="linkTrack">Link Track</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filter-event">Event</label>
      <input id="filter-event" type="text" placeholder="e.g. purchase" style="width:120px">
    </div>

    <button class="btn primary" id="btn-export">⬇ Export JSON</button>
    <button class="btn danger"  id="btn-clear">✕ Clear</button>
    <button class="btn"         id="btn-options">⚙ Options</button>

    <span id="hit-count">0 hits</span>
  </div>

  <!-- Main layout -->
  <div id="main">

    <!-- Hit list -->
    <div id="hit-list">
      <div id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>No Adobe Analytics hits yet.</p>
        <p style="font-size:11px">Browse a page with Adobe Analytics tracking.</p>
      </div>
    </div>

    <!-- Detail pane -->
    <div id="detail-pane">
      <div class="placeholder">
        <span>← Select a hit to inspect</span>
      </div>
    </div>

  </div>

  <script src="panel.js"></script>
</body>
</html>
